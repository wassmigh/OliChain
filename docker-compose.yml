services:
  hardhat:
    build:
      context: ./olichain-contracts
      dockerfile: Dockerfile
    container_name: olichain-hardhat
    ports:
      - "8545:8545"
    networks:
      - olichain-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -sf -X POST http://localhost:8545 -H ''Content-Type: application/json'' -d ''{"jsonrpc":"2.0","method":"net_version","params":[],"id":1}'' || exit 1',
        ]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s

  deployer:
    build:
      context: ./olichain-contracts
      dockerfile: Dockerfile
    container_name: olichain-deployer
    command: >
      sh -c "npx hardhat run scripts/deploy.cjs --network docker"
    depends_on:
      hardhat:
        condition: service_healthy
    networks:
      - olichain-net

  frontend:
    build:
      context: ./olichain
      dockerfile: Dockerfile
    container_name: olichain-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_OLIVE_TRACE_ADDRESS=0x5FbDB2315678afecb367f032d93F642f64180aa3
      - REACT_APP_OLI_PAY_ADDRESS=0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512
      - REACT_APP_RPC_URL=http://localhost:8545
      - REACT_APP_CHAIN_ID=31337
      - REACT_APP_PINATA_API_KEY=f6f52d82aa0e1f0c2d75
      - REACT_APP_PINATA_API_SECRET=b60b6ae2d06e9935fb72b18d93100f8fb4dd7af6f52ad81aff926f5babfdcdac
      - REACT_APP_PINATA_JWT=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..7RY09vVvem43mbHNpWuC-marqxK9hc2h87A_nBPXP_I
      - HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - deployer
    networks:
      - olichain-net

networks:
  olichain-net:
    driver: bridge
